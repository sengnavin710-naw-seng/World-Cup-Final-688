services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ""
        VITE_BRAND_NAME: "${VITE_BRAND_NAME:-World Cup Festival 688}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-8088}:80"
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1/healthz
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
